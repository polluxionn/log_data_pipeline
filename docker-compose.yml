services:
  log-generator:
    build: .
    container_name: log-generator-app
    # 생성기가 실행될 때 연결될 Kafka 정보를 환경변수로 주입합니다.
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=web_events
    depends_on:
      kafka:
        condition: service_healthy

  log-consumer:
    build: .
    container_name: log-consumer-app
    # 컨슈머 모드로 실행하도록 command 덮어쓰기
    command: ["python", "-u", "consumer.py"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=web_events
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-livedb}
      - DB_USER=${POSTGRES_USER:-liveuser}
      - DB_PASS=${POSTGRES_PASSWORD:-livepass}
      - DATALAKE_PATH=/datalake
    volumes:
      # 호스트의 현재 폴더 아래 datalake 폴더와 도커의 /datalake 마운트
      - ./datalake:/datalake
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-livedb}
      - POSTGRES_USER=${POSTGRES_USER:-liveuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-livepass}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liveuser} -d ${POSTGRES_DB:-livedb}"]
      interval: 5s
      timeout: 5s
      retries: 5
