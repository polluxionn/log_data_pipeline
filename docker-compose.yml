version: '3.8'

services:
  log-generator:
    build: .
    container_name: log-generator-app
    # 생성기가 실행될 때 연결될 DB 정보를 환경변수로 주입합니다.
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-livedb}
      - DB_USER=${POSTGRES_USER:-liveuser}
      - DB_PASS=${POSTGRES_PASSWORD:-livepass}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    # PostgreSQL 공식 이미지는 시작될 때 읽어들이는 환경변수가 있습니다.
    # 이 변수들을 통해 기본 DB, 사용자, 비밀번호가 자동으로 만들어집니다.
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-livedb}
      - POSTGRES_USER=${POSTGRES_USER:-liveuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-livepass}
    ports:
      - "5434:5432"
    healthcheck:
      # 앱이 켜지기 전 PostgreSQL이 완전히 켜질때까지 도커를 대기시킵니다.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liveuser} -d ${POSTGRES_DB:-livedb}"]
      interval: 5s
      timeout: 5s
      retries: 5
