# ─────────────────────────────────────────────────────────────
#  LiveKlass 데이터 파이프라인
#
#  [흐름]
#  log-generator → Kafka → log-consumer → DataLake(JSONL)
#                                                ↓
#                                  Airflow DAG (1시간마다)
#                                                ↓
#                                          PostgreSQL
#
#  [PostgreSQL 역할]
#  - livedb      : web_events 테이블 (실제 이벤트 데이터)
#  - airflow_meta: Airflow 내부 메타데이터
# ─────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.0
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-liveuser}:${POSTGRES_PASSWORD:-livepass}@postgres:5432/airflow_meta
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: liveklass-secret-key
    # DAG에서 livedb에 접근하기 위한 환경변수
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: ${POSTGRES_DB:-livedb}
    DB_USER: ${POSTGRES_USER:-liveuser}
    DB_PASS: ${POSTGRES_PASSWORD:-livepass}
    DATALAKE_PATH: /datalake
  volumes:
    - ./dags:/opt/airflow/dags
    - ./datalake:/datalake
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── 이벤트 생성기 (Kafka Producer) ───────────────────────────
  log-generator:
    build: .
    container_name: log-generator-app
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=web_events
    depends_on:
      kafka:
        condition: service_healthy

  # ── 이벤트 컨슈머 (Kafka → DataLake JSONL) ────────────────────
  log-consumer:
    build: .
    container_name: log-consumer-app
    command: ["python", "-u", "consumer.py"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=web_events
      - DATALAKE_PATH=/datalake
    volumes:
      - ./datalake:/datalake
    depends_on:
      kafka:
        condition: service_healthy

  # ── Zookeeper ────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (livedb + airflow_meta 통합) ───────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-livedb}
      - POSTGRES_USER=${POSTGRES_USER:-liveuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-livepass}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d   # airflow_meta DB 자동 생성
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liveuser} -d ${POSTGRES_DB:-livedb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Airflow 초기화 (최초 1회) ─────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@liveklass.com || true
    restart: "no"

  # ── Airflow Webserver (UI: http://localhost:8080) ─────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    command: airflow webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Airflow Scheduler (DAG 실행 엔진) ─────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:  # PostgreSQL 데이터 영속화
